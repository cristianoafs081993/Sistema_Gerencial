<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SUAP Atividades Scraper</title>
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      width: 380px;
      padding: 16px;
      background-color: #f8fafc;
      margin: 0;
      color: #0f172a;
    }
    h2 {
      margin-top: 0;
      font-size: 16px;
      color: #1e293b;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e2e8f0;
    }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      transition: background-color 0.2s;
      font-weight: 500;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    button:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }
    .secondary {
      background-color: #475569;
    }
    .secondary:hover {
      background-color: #334155;
    }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #475569;
      max-height: 150px;
      overflow-y: auto;
      padding: 8px;
      background: white;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      display: none;
      word-wrap: break-word;
    }
    
    .status-line { margin-bottom: 4px; }
    .status-error { color: #ef4444; }
    .status-success { color: #10b981; }
    .status-info { color: #3b82f6; }
  </style>
</head>
<body>
  <h2>SUAP Scraper</h2>
  <button id="btn-extract-en">🚀 Extrair Dimensão (EN - Ensino)</button>
  <button id="btn-extract-all" class="secondary">Extrair Todas as Dimensões</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
