name: Docs Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate documentation coverage
        env:
          DOCS_CHECK_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          DOCS_CHECK_HEAD: ${{ github.sha }}
        run: node scripts/check-docs-coverage.mjs
